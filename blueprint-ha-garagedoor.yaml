blueprint:
  name: Garagepoort met input_boolean helper en positiesensor
  description: >
    Werkt met elke binary_sensor (deur, raam, garagepoort, ESPHome, …).
    Een input_boolean wordt gebruikt om de garagepoort te openen/sluiten
    via een relay en blijft gesynchroniseerd met de sensorstatus.
  domain: automation

  input:
    position_sensor:
      name: Garagepoort positiesensor
      description: Binary sensor (ON = open, OFF = gesloten)
      selector:
        entity:
          domain: binary_sensor

    relay_switch:
      name: Relay garagepoort
      description: Schakelaar die een puls geeft aan de garagepoortmotor
      selector:
        entity:
          domain: switch

    helper_boolean:
      name: Helper input_boolean garagepoort
      description: Input boolean om openen/sluiten aan te sturen
      selector:
        entity:
          domain: input_boolean

mode: single

trigger:
  - platform: state
    entity_id: !input helper_boolean

  - platform: state
    entity_id: !input position_sensor

action:
  - choose:

      # === Helper AAN → openen (indien dicht) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.helper_boolean | string) }}
          - condition: state
            entity_id: !input helper_boolean
            state: "on"
          - condition: state
            entity_id: !input position_sensor
            state: "off"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input relay_switch
          - delay: "00:00:01"
          - service: switch.turn_off
            target:
              entity_id: !input relay_switch

      # === Helper UIT → sluiten (indien open) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.helper_boolean | string) }}
          - condition: state
            entity_id: !input helper_boolean
            state: "off"
          - condition: state
            entity_id: !input position_sensor
            state: "on"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input relay_switch
          - delay: "00:00:01"
          - service: switch.turn_off
            target:
              entity_id: !input relay_switch

      # === Sensor → helper sync (open) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.position_sensor | string) }}
          - condition: state
            entity_id: !input position_sensor
            state: "on"
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: !input helper_boolean

      # === Sensor → helper sync (gesloten) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.position_sensor | string) }}
          - condition: state
            entity_id: !input position_sensor
            state: "off"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input helper_boolean
