blueprint:
  name: Garagepoort met helper switch en positiesensor
  description: >
    Ondersteunt elke binary_sensor (deur, raam, garagepoort, ESPHome, …).
    De helper switch opent/sluit de garagepoort via een relay en
    blijft gesynchroniseerd met de sensorstatus.
  domain: automation

  input:
    position_sensor:
      name: Garagepoort positiesensor
      description: Binary sensor (ON = open, OFF = gesloten)
      selector:
        entity:
          domain: binary_sensor

    relay_switch:
      name: Relay garagepoort
      description: Schakelaar die een puls geeft aan de garagepoortmotor
      selector:
        entity:
          domain: switch

    helper_switch:
      name: Helper switch garagepoort
      description: Helper switch om openen/sluiten aan te sturen
      selector:
        entity:
          domain: switch

mode: single

trigger:
  - platform: state
    entity_id: !input helper_switch

  - platform: state
    entity_id: !input position_sensor

action:
  - choose:

      # === Helper AAN → openen (indien dicht) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.helper_switch | string) }}
          - condition: state
            entity_id: !input helper_switch
            state: "on"
          - condition: state
            entity_id: !input position_sensor
            state: "off"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input relay_switch
          - delay: "00:00:01"
          - service: switch.turn_off
            target:
              entity_id: !input relay_switch

      # === Helper UIT → sluiten (indien open) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.helper_switch | string) }}
          - condition: state
            entity_id: !input helper_switch
            state: "off"
          - condition: state
            entity_id: !input position_sensor
            state: "on"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input relay_switch
          - delay: "00:00:01"
          - service: switch.turn_off
            target:
              entity_id: !input relay_switch

      # === Sensor → helper sync (open) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.position_sensor | string) }}
          - condition: state
            entity_id: !input position_sensor
            state: "on"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input helper_switch

      # === Sensor → helper sync (gesloten) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.position_sensor | string) }}
          - condition: state
            entity_id: !input position_sensor
            state: "off"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input helper_switch
