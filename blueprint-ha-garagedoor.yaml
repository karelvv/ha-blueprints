blueprint:
  name: Garagepoort met helper switch en openingssensor
  description: >
    Houdt de status van een garagepoort bij via een openingssensor
    (deur OF raam) en stuurt de poort aan via een relay.
    Een helper switch wordt gebruikt om de poort te openen en te sluiten
    en blijft gesynchroniseerd met de sensorstatus.
  domain: automation

  input:
    opening_sensor:
      name: Garagepoort openingssensor
      description: Deur- of raamsensor die de status van de poort aangeeft
      selector:
        entity:
          domain: binary_sensor
          device_class: opening

    relay_switch:
      name: Relay garagepoort
      description: Schakelaar die een puls geeft aan de garagepoortmotor
      selector:
        entity:
          domain: switch

    helper_switch:
      name: Helper switch garagepoort
      description: Helper switch om openen/sluiten aan te sturen
      selector:
        entity:
          domain: switch

mode: single

trigger:
  # Gebruiker bedient helper switch
  - platform: state
    entity_id: !input helper_switch

  # Sensorstatus verandert
  - platform: state
    entity_id: !input opening_sensor

action:
  - choose:

      # === Helper AAN → openen (als poort dicht is) ===
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.entity_id == (input.helper_switch | string) }}
          - condition: state
            entity_id: !input helper_switch
            state: "on"
          - condition: state
            entity_id: !input opening_sensor
